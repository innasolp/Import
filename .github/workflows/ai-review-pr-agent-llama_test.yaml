name: AI Code Review Codium PR-agent LLama (via Tailscale)

on:
  workflow_dispatch: 
    inputs:
      pr_number:
        description: 'Input pull request number'
        required: true
        type: string
      model_name:
        description: 'Select Ollama model'
        required: true
        default: 'qwen2.5-coder:14b'
        type: choice
        options:
          - 'qwen2.5-coder:14b'
          - 'qwen2.5-coder:7b' 
          - 'qwen2.5-coder:3b'  
      language:
        description: 'Select response language'
        required: true
        default: 'English'
        type: choice
        options:
          - 'English'
          - 'Russian'
  
jobs:
  review:
    runs-on: ubuntu-latest
    permissions: # Добавьте этот блок
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check secrets availability
        run: |
          if [ -z "${{ secrets.TS_OAUTH_CLIENT_ID }}" ]; then
            echo "Secret is EMPTY"
            exit 1
          fi    

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}         
          tags: tag:ci

      - name: Get git diff
        id: diff_step
        run: |
          # 1. Автоматически определяем дефолтную ветку репозитория (если это не PR)
          # Используем API или просто берем ту, куда указывает репозиторий
          DEFAULT_BRANCH=$(git remote show origin | sed -n '/HEAD branch/s/.*: //p')
          
          # 2. Определяем базовую ветку для сравнения
          BASE_BRANCH="${{ github.base_ref }}"
          if [ -z "$BASE_BRANCH" ]; then
            BASE_BRANCH=$DEFAULT_BRANCH
          fi
          
          echo "Base branch is determined as: $BASE_BRANCH"
          
          # 3. Подтягиваем базовую ветку, чтобы git её увидел
          git fetch origin $BASE_BRANCH --depth=100
          
          # 4. Выполняем сравнение
          git diff origin/$BASE_BRANCH HEAD -- . ':(exclude)*.lock' > diff.txt
          
          # 5. Выводим результат для следующих шагов
          if [ -s diff.txt ]; then
            echo "has_diff=true" >> $GITHUB_OUTPUT
            echo "Changes found."
          else
            echo "has_diff=false" >> $GITHUB_OUTPUT
            echo "No changes detected."
          fi

      - name: Connect to llama
        run: |
          tailscale status
          # Пробуем просто достучаться до API
          curl -v --connect-timeout 10 ${{ secrets.OLLAMA_QWEN_7B_ENDPOINT }}/models

      - name: Checking model in llama.cpp
        run: |
            SEARCH_STRING=$(echo "${{ github.event.inputs.model_name }}" | sed 's/:/-/g')
            if curl -s ${{ secrets.OLLAMA_QWEN_7B_ENDPOINT }}/props | grep -qi "$SEARCH_STRING"; then
              echo "✅ Model ${{ github.event.inputs.model_name }} loaded successfully."
            else
              echo "❌ Error: Model ${{ github.event.inputs.model_name }} not found in llama.cpp!"
              exit 1
            fi  
          
      # Шаг 1: Изменения и описание
      - name: PR Agent - Description & Changes
        run: |
          docker run --rm \
            --network=host \
            -v ${{ github.workspace }}:/github/workspace \
            -w /app \
            -e GITHUB__USER_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            -e CONFIG__MODEL="openai/${{ github.event.inputs.model_name }}" \
            -e CONFIG__AI_TIMEOUT="1200" \
            -e CONFIG__CUSTOM_MODEL_MAX_TOKENS="4000" \
            -e OPENAI__API_BASE=${{ secrets.OLLAMA_QWEN_7B_ENDPOINT }} \
            codiumai/pr-agent:latest \
            --pr_url="${{ github.server_url }}/${{ github.repository }}/pull/${{ inputs.pr_number }}" \
            ask "In ${{ github.event.inputs.language }}, provide a short summary of the main changes in this PR and describe what it does."


       # Шаг 2: Анализ кода на ошибки
      - name: PR Agent - Bug Analysis
        run: |
          docker run --rm \
            --network=host \
            -v ${{ github.workspace }}:/github/workspace \
            -w /app \
            -e GITHUB__USER_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            -e CONFIG__MODEL="openai/${{ github.event.inputs.model_name }}" \
            -e CONFIG__AI_TIMEOUT="1200" \
            -e CONFIG__CUSTOM_MODEL_MAX_TOKENS="4000" \
            -e OPENAI__API_BASE=${{ secrets.OLLAMA_QWEN_7B_ENDPOINT }} \
            codiumai/pr-agent:latest \
            --pr_url="${{ github.server_url }}/${{ github.repository }}/pull/${{ inputs.pr_number }}" \
            ask "Point out any critical bugs, logical errors, or performance issues in the code changes. Answer ONLY in ${{ github.event.inputs.language }} language."       
